limit_req_zone $binary_remote_addr zone=dashboard_api:2m rate=10r/s;

server {
    listen 80;
    server_name now.m1301.cyou;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name now.m1301.cyou;

    ssl_certificate /etc/letsencrypt/live/now.m1301.cyou/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/now.m1301.cyou/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /api/report {
        limit_req zone=dashboard_api burst=30 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
